<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>동샵 관리자</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f1f5f9;display:flex;min-height:100vh;color:#1e293b}
    /* Sidebar */
    #sidebar{width:220px;background:#1e293b;color:#cbd5e1;display:flex;flex-direction:column;flex-shrink:0;position:fixed;top:0;left:0;height:100vh;z-index:100}
    #sidebar .logo{padding:24px 20px 20px;border-bottom:1px solid #334155}
    #sidebar .logo h1{font-size:18px;font-weight:700;color:#f97316}
    #sidebar .logo span{font-size:11px;color:#64748b;margin-top:2px;display:block}
    #sidebar nav{flex:1;padding:12px 0;overflow-y:auto}
    #sidebar nav a{display:flex;align-items:center;gap:10px;padding:10px 20px;font-size:13px;color:#94a3b8;cursor:pointer;border-left:3px solid transparent;transition:all .15s;text-decoration:none}
    #sidebar nav a:hover{color:#f1f5f9;background:#334155}
    #sidebar nav a.active{color:#f97316;background:#2d3f55;border-left-color:#f97316}
    #sidebar nav a svg{width:16px;height:16px;flex-shrink:0}
    #sidebar .badge{margin-left:auto;background:#ef4444;color:white;font-size:10px;padding:1px 6px;border-radius:9999px;font-weight:700}
    /* Main */
    #main{margin-left:220px;flex:1;display:flex;flex-direction:column;min-height:100vh}
    #topbar{background:white;padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #e2e8f0;position:sticky;top:0;z-index:50}
    #topbar h2{font-size:16px;font-weight:600;color:#1e293b}
    #topbar .time{font-size:12px;color:#94a3b8}
    #content{padding:24px 28px;flex:1}
    /* Page */
    .page{display:none}.page.active{display:block}
    /* Cards */
    .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:24px}
    .stat-card{background:white;border-radius:12px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
    .stat-card .label{font-size:12px;color:#64748b;font-weight:500;margin-bottom:6px}
    .stat-card .value{font-size:28px;font-weight:700;color:#1e293b}
    .stat-card .sub{font-size:11px;color:#94a3b8;margin-top:4px}
    .card{background:white;border-radius:12px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:20px}
    .card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
    .card-header h3{font-size:14px;font-weight:600;color:#1e293b}
    /* Table */
    table{width:100%;border-collapse:collapse}
    th{font-size:11px;font-weight:600;color:#64748b;text-transform:uppercase;letter-spacing:.05em;padding:8px 12px;text-align:left;border-bottom:2px solid #f1f5f9}
    td{padding:10px 12px;font-size:13px;border-bottom:1px solid #f8fafc;vertical-align:middle}
    tr:hover td{background:#fafbfc}
    /* Buttons */
    .btn{padding:6px 14px;border:none;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s;display:inline-flex;align-items:center;gap:5px}
    .btn-primary{background:#f97316;color:white}.btn-primary:hover{background:#ea6c08}
    .btn-success{background:#10b981;color:white}.btn-success:hover{background:#059669}
    .btn-danger{background:#ef4444;color:white}.btn-danger:hover{background:#dc2626}
    .btn-secondary{background:#f1f5f9;color:#475569}.btn-secondary:hover{background:#e2e8f0}
    .btn-blue{background:#3b82f6;color:white}.btn-blue:hover{background:#2563eb}
    .btn-sm{padding:4px 10px;font-size:11px}
    /* Badge */
    .badge-green{background:#d1fae5;color:#065f46;padding:3px 8px;border-radius:9999px;font-size:11px;font-weight:600}
    .badge-gray{background:#f1f5f9;color:#475569;padding:3px 8px;border-radius:9999px;font-size:11px;font-weight:600}
    .badge-red{background:#fee2e2;color:#991b1b;padding:3px 8px;border-radius:9999px;font-size:11px;font-weight:600}
    .badge-orange{background:#ffedd5;color:#9a3412;padding:3px 8px;border-radius:9999px;font-size:11px;font-weight:600}
    /* Form */
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .form-group{display:flex;flex-direction:column;gap:5px}
    .form-group.full{grid-column:1/-1}
    .form-group label{font-size:12px;font-weight:600;color:#374151}
    .form-group input,.form-group select{padding:8px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:13px;outline:none;transition:border .15s;background:white;color:#1e293b}
    .form-group input:focus,.form-group select:focus{border-color:#f97316;box-shadow:0 0 0 3px rgba(249,115,22,.1)}
    /* Order card */
    .order-card{background:white;border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.06);border-left:4px solid #f97316}
    .order-card.delivery{border-left-color:#3b82f6}
    .order-meta{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
    .order-id{font-size:13px;font-weight:700;color:#1e293b}
    .order-time{font-size:11px;color:#94a3b8}
    .order-items{font-size:12px;color:#475569;margin:6px 0}
    .order-footer{display:flex;justify-content:space-between;align-items:center;margin-top:10px;padding-top:10px;border-top:1px solid #f1f5f9}
    .order-price{font-size:15px;font-weight:700;color:#f97316}
    /* Divider */
    .divider{height:1px;background:#f1f5f9;margin:16px 0}
    /* Empty */
    .empty{text-align:center;padding:40px;color:#94a3b8;font-size:13px}
    /* Refresh indicator */
    .live-dot{width:8px;height:8px;background:#10b981;border-radius:50%;display:inline-block;margin-right:6px;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  </style>
</head>
<body>
<div id="sidebar">
  <div class="logo">
    <h1>🍜 동샵</h1>
    <span>관리자 센터</span>
  </div>
  <nav>
    <a onclick="showPage('dashboard')" class="active" id="nav-dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      대시보드
    </a>
    <a onclick="showPage('products')" id="nav-products">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      상품 관리
    </a>
    <a onclick="showPage('timeslots')" id="nav-timeslots">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      시간대 관리
    </a>
    <a onclick="showPage('orders')" id="nav-orders">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      주문 내역
      <span class="badge" id="orders-badge" style="display:none">0</span>
    </a>
    <a onclick="showPage('delivery')" id="nav-delivery">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 17H3a2 2 0 01-2-2V5a2 2 0 012-2h11a2 2 0 012 2v3"/><rect x="9" y="11" width="14" height="10" rx="2"/><circle cx="12" cy="21" r="1"/><circle cx="20" cy="21" r="1"/></svg>
      배달 관리
      <span class="badge" id="delivery-badge" style="display:none">0</span>
    </a>
  </nav>
</div>

<div id="main">
  <div id="topbar">
    <h2 id="topbar-title">대시보드</h2>
    <span class="time"><span class="live-dot"></span>실시간 연동</span>
  </div>
  <div id="content">

    <!-- 대시보드 -->
    <div class="page active" id="page-dashboard">
      <div class="stats-grid">
        <div class="stat-card"><div class="label">총 상품</div><div class="value" id="stat-products">-</div><div class="sub">등록된 상품 수</div></div>
        <div class="stat-card"><div class="label">오늘 주문</div><div class="value" id="stat-orders">-</div><div class="sub">일반 주문</div></div>
        <div class="stat-card"><div class="label">배달 주문</div><div class="value" id="stat-delivery">-</div><div class="sub">배달 세션 주문</div></div>
        <div class="stat-card"><div class="label">활성 세션</div><div class="value" id="stat-sessions">-</div><div class="sub">진행중인 배달</div></div>
      </div>
      <div class="card">
        <div class="card-header"><h3>최근 주문</h3><button class="btn btn-secondary btn-sm" onclick="showPage('orders')">전체 보기</button></div>
        <div id="dashboard-recent-orders"><div class="empty">불러오는 중...</div></div>
      </div>
    </div>

    <!-- 상품 관리 -->
    <div class="page" id="page-products">
      <div class="card">
        <div class="card-header">
          <h3>상품 목록</h3>
          <button class="btn btn-primary btn-sm" onclick="openProductForm()">+ 상품 등록</button>
        </div>
        <table>
          <thead><tr><th>상품</th><th>가격</th><th>카테고리</th><th>상태</th><th>액션</th></tr></thead>
          <tbody id="products-tbody"></tbody>
        </table>
      </div>
      <div class="card" id="product-form-card" style="display:none">
        <div class="card-header"><h3 id="form-title">상품 등록</h3><button class="btn btn-secondary btn-sm" onclick="resetForm()">취소</button></div>
        <div class="form-grid">
          <div class="form-group"><label>ID</label><input id="f-id" placeholder="숫자 ID" /></div>
          <div class="form-group"><label>이모지</label><input id="f-image" placeholder="🍜" /></div>
          <div class="form-group full"><label>상품명</label><input id="f-name" placeholder="상품명 입력" /></div>
          <div class="form-group"><label>가격</label><input id="f-price" type="number" placeholder="3500" /></div>
          <div class="form-group"><label>카테고리</label><input id="f-category" placeholder="ramen / snack" /></div>
          <div class="form-group full"><label>옵션 (쉼표 구분)</label><input id="f-options" placeholder="짜게, 중간, 싱겁게" /></div>
        </div>
        <div style="margin-top:16px;display:flex;gap:8px">
          <button class="btn btn-success" onclick="submitProduct()">저장</button>
          <button class="btn btn-secondary" onclick="resetForm()">취소</button>
        </div>
      </div>
    </div>

    <!-- 시간대 관리 -->
    <div class="page" id="page-timeslots">
      <div class="card">
        <div class="card-header"><h3>시간대 목록</h3></div>
        <table>
          <thead><tr><th>시간대</th><th>상태</th></tr></thead>
          <tbody id="timeslots-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- 주문 내역 -->
    <div class="page" id="page-orders">
      <div class="card-header" style="margin-bottom:16px">
        <h3 style="font-size:14px;font-weight:600;color:#1e293b">일반 주문 내역</h3>
        <span class="live-dot" style="margin-left:8px"></span>
      </div>
      <div id="orders-container"></div>
    </div>

    <!-- 배달 관리 -->
    <div class="page" id="page-delivery">
      <div class="card">
        <div class="card-header"><h3>세션 생성</h3></div>
        <div class="form-grid">
          <div class="form-group full"><label>세션 이름</label><input id="ds-title" placeholder="4월 15일 점심 배달" /></div>
          <div class="form-group"><label>시작 시간</label><input id="ds-start" placeholder="12:00" /></div>
          <div class="form-group"><label>종료 시간</label><input id="ds-end" placeholder="12:30" /></div>
        </div>
        <div style="margin-top:16px"><button class="btn btn-success" onclick="createSession()">세션 생성</button></div>
      </div>
      <div id="sessions-container"></div>
      <div class="card" style="margin-top:20px">
        <div class="card-header"><h3>배달 주문 내역</h3></div>
        <div id="delivery-orders-container"></div>
      </div>
    </div>

  </div>
</div>
